<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Landing Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="d-flex flex-column align-items-end justify-content-between">
      <div class="side-bar-links">
        <div class="logo">
          <div class="logo-item px-3"><i class="fs-3 bi bi-twitter-x"></i></i></div>
        </div>
        <div class="sidebar-item">
          <span class="item fw-bold fs-5">
            <span class="material-symbols-outlined"> home </span>
            Home</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <i class="fs-4 bi bi-search"></i> Explore</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <i class="fs-4 bi bi-bell"></i>
            Notifications</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <span class="material-symbols-outlined"> mail </span> Messages</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <i class="fs-5 bi bi-bookmark"></i>
            Bookmarks</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <span class="material-symbols-outlined"> article </span> Lists</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <i class="fs-4 bi bi-person"></i> Profile</span
          >
        </div>
        <div class="sidebar-item">
          <span class="item fs-5 fw-medium">
            <span class="material-symbols-outlined"> pending </span> More</span
          >
        </div>
        <div class="tweet d-flex align-items-center justify-content-center">
          <span class="fs-6 fw-medium">Tweet</span>
        </div>
      </div>
      <div class="profile">
        <div class="sidebar-footer d-flex flex-column mb-3">
          <span><i class="fs-4 bi bi-person"></i> Sibusiso Masilela</span>
          <p>@sibusiso</p>
        </div>
      </div>
    </header>
  </body>
</html>
