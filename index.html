<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitter Landing Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-body">
      <div
        class="header d-flex flex-column align-items-end justify-content-between"
      >
        <div class="sidebar">
          <div class="side-bar-links">
            <div class="logo">
              <div class="logo-item px-3">
                <i class="fs-3 bi bi-twitter-x"></i>
              </div>
            </div>
            <div class="sidebar-item">
              <span class="item fw-bold fs-5">
                <span class="material-symbols-outlined"> home </span>
                Home</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <i class="fs-4 bi bi-search"></i> Explore</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <i class="fs-4 bi bi-bell"></i>
                Notifications</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <span class="material-symbols-outlined"> mail </span> Chat</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <img src="assets/grok.svg" alt="grok" /> Grok</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <i class="fs-5 bi bi-bookmark"></i>
                Bookmarks</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <span class="material-symbols-outlined"> article </span
                >Article</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <i class="fs-4 bi bi-person"></i> Profile</span
              >
            </div>
            <div class="sidebar-item">
              <span class="item fs-5 fw-medium">
                <span class="material-symbols-outlined"> pending </span>
                More</span
              >
            </div>
            <div
              class="tweet bg-white d-flex align-items-center justify-content-center"
            >
              <span class="bg-white text-dark fs-6 fw-bold">Post</span>
            </div>
          </div>
          <div class="profile">
            <div class="sidebar-footer d-flex flex-column mb-3">
              <span><i class="fs-4 bi bi-person"></i> Sibusiso Masilela</span>
              <p>@sibusiso</p>
            </div>
          </div>
        </div>
      </div>
      <div class="main">
        <div class="main-top">
          <div class="top-left">
            <span>For you</span>
          </div>
          <div class="top-right">
            <span>Following</span>
          </div>
        </div>
        <div class="post-message">
          <span class="message-profile"
            ><i class="fs-3 mx-3 my-2 bi bi-person-circle"></i
          ></span>
          <input
            class="message my-1 fs-5 border border-0"
            type="text"
            placeholder="What's happening?"
          />
          <span class="fs-8 fw-bold globe"
            ><img src="assets/globe.svg" alt="globe" /> Everyone can reply</span
          >
          <div
            class="message-icons d-flex justify-content-space-between align-items-center"
          >
            <div
              class="message-icon-item d-flex justify-content-space-between align-items-center"
            >
              <div class="message-icon">
                <span class="icon fs-8"
                  ><img src="assets/image.svg" alt="image"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"><img src="assets/gif.svg" alt="gif" /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/blue_grok.svg" alt="grok"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/list.svg" alt="list"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/mood.svg" alt="smile"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/calendar_clock.svg" alt="calendar"
                /></span>
              </div>

              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/location.svg" alt="location"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/flag.svg" alt="flag"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/bold.svg" alt="bold"
                /></span>
              </div>
              <div class="message-icon">
                <span class="fs-8"
                  ><img src="assets/italic.svg" alt="italic"
                /></span>
              </div>
            </div>
            <div class="btn-post-message">
              <button
                class="post text-black fw-bold border border-0 rounded-pill"
              >
                Post
              </button>
            </div>
          </div>
        </div>
        <div class="num-post">
          <p class="text-center text">Showing 5 posts</p>
        </div>
      </div>
      <div class="footer">
        <div class="searchbar border border-1 rounded-pill mx-3">
          <span><i class="fs-6 bi bi-search"></i></span>
          <input class="border-0" type="text" placeholder="search" />
        </div>
      </div>
    </div>
  </body>
</html>
